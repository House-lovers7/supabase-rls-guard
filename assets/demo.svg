  <circle cx="42" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="62" cy="16" r="6" fill="#a6e3a1"/>
  <text x="390" y="21" fill="#6c7086" text-anchor="middle" font-size="12">supabase-rls-guard</text>

  <text x="18" y="64"><tspan fill="#a6e3a1">$</tspan> <tspan fill="#cdd6f4">npx supabase-rls-guard ./supabase/migrations</tspan></text>

  <rect x="18" y="84" width="80" height="20" rx="3" fill="#f38ba8"/>
  <text x="58" y="98" fill="#11111b" text-anchor="middle" font-weight="bold" font-size="12">CRITICAL</text>
  <text x="108" y="98"><tspan fill="#cdd6f4" font-weight="bold">RLS001</tspan> <tspan fill="#f38ba8">public.api_keys</tspan></text>
  <text x="34" y="120" fill="#bac2de" font-size="13">Table public.api_keys has no RLS — anyone with the anon key can read/write it.</text>
  <text x="34" y="140" fill="#6c7086" font-size="13">↳ fix: ALTER TABLE public.api_keys ENABLE ROW LEVEL SECURITY;</text>

  <rect x="18" y="160" width="80" height="20" rx="3" fill="#f38ba8"/>
  <text x="58" y="174" fill="#11111b" text-anchor="middle" font-weight="bold" font-size="12">CRITICAL</text>
  <text x="108" y="174"><tspan fill="#cdd6f4" font-weight="bold">RLS004</tspan> <tspan fill="#f38ba8">public.api_keys.token</tspan></text>
  <text x="34" y="196" fill="#bac2de" font-size="13">Column "token" looks sensitive and the table has no RLS — exposed over the API.</text>

  <rect x="18" y="216" width="62" height="20" rx="3" fill="#f9e2af"/>
  <text x="49" y="230" fill="#11111b" text-anchor="middle" font-weight="bold" font-size="12">WARNING</text>
  <text x="90" y="230"><tspan fill="#cdd6f4" font-weight="bold">RLS008</tspan> <tspan fill="#f9e2af">public.todos</tspan></text>
  <text x="34" y="252" fill="#bac2de" font-size="13">Policy calls auth.uid() directly; wrap it as (select auth.uid()) for performance.</text>

  <text x="18" y="294"><tspan fill="#f38ba8" font-weight="bold">✖ 2 critical, 1 warning</tspan> <tspan fill="#bac2de">across 3 file(s) ·</tspan> <tspan fill="#f38ba8">failing (threshold: critical)</tspan></text>
  <text x="18" y="318" fill="#6c7086" font-size="12">exit code 1 — the CI check fails before the migration ships</text>
