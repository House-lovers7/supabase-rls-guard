<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 350" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <rect width="780" height="350" rx="10" fill="#11111b"/>
