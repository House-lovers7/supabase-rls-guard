name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for npm Trusted Publishing (OIDC). Configure the trusted publisher
  # for this repo/workflow in the npm package settings first; then provenance is
  # generated automatically and no NPM_TOKEN secret is needed.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

      # npm >= 11.5.1 (bundled with Node 24) publishes with OIDC provenance.
      - run: npm publish --access public
