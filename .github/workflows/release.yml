name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for npm Trusted Publishing (OIDC). Configure the trusted publisher
  # for this repo/workflow in the npm package settings first; then provenance is
  # generated automatically and no NPM_TOKEN secret is needed.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit:deps

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test

      - name: Validate published package
        run: pnpm validate:package

      # npm >= 11.5.1 (bundled with Node 24) publishes with OIDC provenance.
      - run: npm publish --access public
